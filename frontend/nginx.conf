server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # 演示数据 API 控制台（与主站同端口，子路径部署）
  location ^~ /demo-console/ {
    root /usr/share/nginx/html;
    # 演示子站迭代快，禁用缓存以免用户一直看到旧版
    add_header Cache-Control "no-store, must-revalidate" always;
    try_files $uri $uri/ /demo-console/index.html;
  }

  location = /demo-console {
    return 301 /demo-console/;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://backend-prod:8000/api/;
    proxy_http_version 1.1;
    proxy_connect_timeout 30s;
    proxy_send_timeout 180s;
    proxy_read_timeout 180s;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /ws/ {
    proxy_pass http://backend-prod:8000/ws/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
  }
}
