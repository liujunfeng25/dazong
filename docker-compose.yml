services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: 116165
      MYSQL_DATABASE: dazong
    volumes:
      - ./mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"

  backend:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: 116165
      DB_NAME: dazong
      JWT_SECRET: dazong_demo_secret_2026
      DEMO_MODE: "true"
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: 116165
      MYSQL_DB: dazong
      JWT_SECRET_KEY: dazong_demo_secret_2026
    depends_on:
      - mysql
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 80"
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./demo-console:/demo-console
    ports:
      - "80:80"
